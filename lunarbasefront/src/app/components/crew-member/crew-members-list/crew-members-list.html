<div class="container-sm border rounded-3 border-danger-subtle bg-warning-subtle text-center mt-4"
    style="width: 50%; height: auto">
    <h1 class="title">Liste des membres d'équipage</h1>
    @if (connected()) {
    <button type="button" class="btn btn-success m-2" (click)="addCrewMember()">
        <i class="bi bi-plus-square"></i> Nouveau membre
    </button>
    }
</div>
<div class="container mt-4">
    <div class="rounded-3 shadow overflow-hidden">
        <table class="table table-hover table-bordered align-middle mb-0">
            <thead class="table-dark text-center">
                <tr>
                    <th>ID</th>
                    <th>Prénom</th>
                    <th>Nom</th>
                    <th>Rôle</th>
                    <th>Combinaison</th>
                    @if (connected()) {
                    <th>Éditer</th>
                    <th>Supprimer</th>
                    }
                </tr>
            </thead>
            <tbody>
                @for (member of allCrewMembers(); track member.crewMemberId; let isEven = $even) {
                <tr app-crew-member-list-item [member]="member" class="text-center" [class.table-primary]="isEven"
                    [class.table-info]="!isEven"></tr>
                }
            </tbody>
        </table>
    </div>
</div>
